name: VS Code Extension

on:
  push:
    tags:
      - 'vscode-ext-v*'
  pull_request:
    paths:
      - 'editors/vscode-cmpl/**'
      - 'cmpl.schema.json'
      - '.github/workflows/vscode-extension.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: editors/vscode-cmpl

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Sync bundled schema from repo root
        run: npm run sync-schema

      - name: Fail if the bundled schema drifted from cmpl.schema.json
        run: git diff --exit-code schemas/cmpl.schema.json

      - name: Package .vsix
        run: npx vsce package

      - uses: actions/upload-artifact@v4
        with:
          name: cmpl-language-vsix
          path: editors/vscode-cmpl/*.vsix

  publish:
    # Only on a vscode-ext-v* tag, and only after a clean build.
    needs: build
    if: startsWith(github.ref, 'refs/tags/vscode-ext-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Publish to the VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish --pat "$OVSX_PAT"