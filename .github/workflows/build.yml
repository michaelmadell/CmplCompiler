name: Build

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build solution (CLI target)
        run: dotnet build CmplPiler.slnx --configuration Release

      - name: Smoke test CLI (list, dry-run)
        run: |
          dotnet run --project CmplPiler --configuration Release -- examples/hello-cpp/hello.cmpl --list
          dotnet run --project CmplPiler --configuration Release -- examples/hello-cpp/hello.cmpl -p gcc-release --dry-run

      - name: Build example with gcc via cmpl
        if: runner.os == 'Linux'
        run: |
          dotnet run --project CmplPiler --configuration Release -- examples/hello-cpp/hello.cmpl -p gcc-release
          ./examples/hello-cpp/build/gcc-release/hello

      - name: Self-host build of the CLI
        run: dotnet run --project CmplPiler --configuration Release -- examples/self-host.cmpl -p cli-release

      - name: Publish self-contained Linux CLI
        if: runner.os == 'Linux'
        run: dotnet publish CmplPiler -c Release -r linux-x64 --self-contained /p:PublishSingleFile=true

      - name: Publish self-contained Windows GUI (single file)
        if: runner.os == 'Windows'
        run: dotnet publish CmplPiler -c Release -r win-x64 --self-contained /p:PublishSingleFile=true